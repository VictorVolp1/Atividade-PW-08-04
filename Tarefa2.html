        <form id="formCurriculo">
    <h2>Cadastro de Currículo</h2>

    <label>Nome Completo:</label>
    <input type="text" name="nome">

    <label>E-mail:</label>
    <input type="email" name="email">

    <label>Idade:</label>
    <input type="number" name="idade">

    <label>Telefone:</label>
    <input type="text" name="telefone" id="telefone" placeholder="(00) 00000-0000">

    <label>CPF:</label>
    <input type="text" name="cpf" id="cpf" placeholder="000.000.000-00">

    <label>Área de Interesse:</label>
    <select name="area">
        <option value="">Selecione...</option>
        <option value="ti">Tecnologia</option>
        <option value="mkt">Marketing</option>
        <option value="adm">Administração</option>
    </select>

    <label>Experiência Profissional:</label>
    <textarea name="experiencia" rows="4"></textarea>

    <label>Senha:</label>
    <input type="password" name="senha" id="senha">

    <label>Confirmar Senha:</label>
    <input type="password" name="confirmar_senha">

    <button type="submit">Enviar Currículo</button>
</form>
